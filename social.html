<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Соцсети — AUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #0D1117;
            --secondary-dark: #161B22;
            --surface-dark: #1C2333;
            --card-dark: #21283B;
            --accent-green: #00E676;
            --accent-glow: rgba(0, 230, 118, 0.3);
            --accent-tint: rgba(0, 230, 118, 0.06);
            --text-primary: #FFFFFF;
            --text-secondary: #B0B8C8;
            --text-muted: #6B7280;
            --border-subtle: #2D3548;
            
            --telegram: #24A1DE;
            --youtube: #FF0000;
            --twitch: #9146FF;
            --tiktok: #FE2C55;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--primary-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 10%, #1a2333 0%, #0d1117 100%);
        }

        .launcher-window {
            width: 95vw;
            max-width: 1100px;
            height: 85vh;
            max-height: 700px;
            background: var(--primary-dark);
            border: 1px solid var(--accent-tint);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .title-bar {
            height: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border-subtle);
        }

        .title-left { display: flex; align-items: center; gap: 10px; }
        .app-logo { width: 20px; height: 20px; background: var(--accent-green); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #000; }
        .app-name { font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 1px; font-weight: 700; }
        .page-title { color: var(--text-muted); font-size: 12px; margin-left: 5px; }

        .main-layout { flex: 1; display: grid; grid-template-columns: 240px 1fr; overflow: hidden; }

        .sidebar {
            background: var(--secondary-dark);
            border-right: 1px solid var(--border-subtle);
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 600;
        }

        .nav-item i { width: 20px; text-align: center; font-size: 16px; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }
        .nav-item.active { background: var(--accent-tint); color: var(--accent-green); position: relative; }
        .nav-item.active::before { content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px; background: var(--accent-green); border-radius: 0 4px 4px 0; }

        .content-area { padding: 32px; overflow-y: auto; }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .social-card {
            background: var(--card-dark);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .social-card:hover {
            transform: translateY(-3px);
            border-color: var(--accent-green);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .sc-info h3 { font-family: 'Orbitron', sans-serif; font-size: 16px; margin-bottom: 2px; }
        .sc-info p { font-size: 12px; color: var(--text-muted); }

        /* Hover colors */
        .sc-tg:hover .icon-box { background: var(--telegram); color: #fff; box-shadow: 0 0 20px var(--telegram); }
        .sc-yt:hover .icon-box { background: var(--youtube); color: #fff; box-shadow: 0 0 20px var(--youtube); }
        .sc-tw:hover .icon-box { background: var(--twitch); color: #fff; box-shadow: 0 0 20px var(--twitch); }
        .sc-tt:hover .icon-box { background: var(--tiktok); color: #fff; box-shadow: 0 0 20px var(--tiktok); }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 28px; margin-bottom: 10px; }
        .desc { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; }

        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>

<body>

    <div class="launcher-window">
        <div class="title-bar">
            <div class="title-left">
                <div class="app-logo">A</div>
                <span class="app-name">AUM</span>
                <span class="page-title" data-i18n="page_title">- Among Us Modder</span>
            </div>
            <div class="window-controls">
                <span>—</span>
                <span><i class="far fa-square"></i></span>
                <span>✕</span>
            </div>
        </div>

        <div class="main-layout">
            <div class="sidebar">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span data-i18n="nav_home">Главная</span>
                </a>
                <a href="social.html" class="nav-item active">
                    <i class="fas fa-share-alt"></i>
                    <span data-i18n="nav_social">Соцсети</span>
                </a>
            </div>

            <div class="content-area">
                <h1 data-i18n="soc_h1">Наши соцсети</h1>
                <p class="desc" data-i18n="soc_p">Будьте в курсе последних обновлений и новостей проекта.</p>

                <div class="social-grid">
                    <a href="https://t.me/dima_kovboi" target="_blank" class="social-card sc-tg">
                        <div class="icon-box"><i class="fab fa-telegram-plane"></i></div>
                        <div class="sc-info">
                            <h3>Telegram</h3>
                            <p data-i18n="s_tg">Новости и обновления</p>
                        </div>
                    </a>
                    <a href="https://www.youtube.com/@dimakovboi" target="_blank" class="social-card sc-yt">
                        <div class="icon-box"><i class="fab fa-youtube"></i></div>
                        <div class="sc-info">
                            <h3>YouTube</h3>
                            <p data-i18n="s_yt">Видео и гайды</p>
                        </div>
                    </a>
                    <a href="https://www.twitch.tv/dimakovboi" target="_blank" class="social-card sc-tw">
                        <div class="icon-box"><i class="fab fa-twitch"></i></div>
                        <div class="sc-info">
                            <h3>Twitch</h3>
                            <p data-i18n="s_tw">Прямые эфиры</p>
                        </div>
                    </a>
                    <a href="https://tiktok.com/@dima.kovboi" target="_blank" class="social-card sc-tt">
                        <div class="icon-box"><i class="fab fa-tiktok"></i></div>
                        <div class="sc-info">
                            <h3>TikTok</h3>
                            <p data-i18n="s_tt">Короткие клипы</p>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            ru: {
                page_title: "- Among Us Modder",
                nav_home: "Главная",
                nav_social: "Соцсети",
                soc_h1: "Наши соцсети",
                soc_p: "Будьте в курсе последних обновлений и новостей проекта.",
                s_tg: "Новости и обновления",
                s_yt: "Видео и гайды",
                s_tw: "Прямые эфиры",
                s_tt: "Короткие клипы"
            },
            en: {
                page_title: "- Among Us Modder",
                nav_home: "Home",
                nav_social: "Socials",
                soc_h1: "Social Media",
                soc_p: "Stay updated with our latest project news.",
                s_tg: "News & Updates",
                s_yt: "Videos & Guides",
                s_tw: "Live Streams",
                s_tt: "Short Clips"
            }
        };

        const userLang = navigator.language || navigator.userLanguage;
        const lang = userLang.startsWith('ru') ? 'ru' : 'en';

        function applyLang() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.innerText = i18n[lang][key];
                }
            });
        }
        applyLang();
    </script>
</body>
</html>
